---
layout: default
---

<article class="post">
  <h1>{{ page.title }}</h1>

  {% if page.image %}
  <img src="{{ page.image }}" alt="{{ page.title }}" style="width:100%; border-radius:6px; margin-bottom:1.5em;">
  {% endif %}

  <div class="entry">
    {{ content }}
  </div>

  <div class="date">
    <br>
    Written on {{ page.date | date: "%B %e, %Y" }}
  </div>

  {% include disqus.html %}
</article>
