---
layout: default
---

<article class="post">
  <h1>{{ page.title }}</h1>

  {% if page.image %}
  <figure class="post-hero">
    <img src="{{ page.image }}" alt="{{ page.title }}">
    {% if page.image_caption %}
    <figcaption>{{ page.image_caption }}</figcaption>
    {% endif %}
  </figure>
  {% endif %}

  <div class="entry">
    {{ content }}
  </div>

  <div class="date">
    <br>
    Written on {{ page.date | date: "%B %e, %Y" }}
  </div>

  {% include disqus.html %}
</article>
